---
- name: custom motd
  hosts: all
  become: yes
  vars_files:
    - ../vars/password.yml
  vars:
    owner_name: madmin1
  tasks:
    - name: move file motd
      template:
        src: ../templates/motd.j2
        dest: /etc/motd
        owner: root
        group: root
        mode: '0644'
      notify: cleanup old motd

    - name: clear treash
      file:
        path: "/etc/update-motd.d/{{ item }}"
        mode: '0644'
      loop:
        - 10-help-text
        - 50-motd-news
        - 91-contract-ua-esm-status

  handlers:
    - name: cleanup old motd
      file:
        path: /etc/legal
        state: absent

