---
- name: Install nginx 
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Start and enable nginx service
  service:
    name: nginx
    state: started
    enabled: yes

- name: remove default config
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: genarate app config
  template:
    src: app_proxy.conf.j2
    dest: "/etc/nginx/sites-enabled/{{ item.key }}.conf"
    validate: "nginx -t -c /etc/nginx/nginx.conf -g 'events {} http { include %s; }'"
  loop: "{{ web_services | dict2items }}"
  notify: restart nginx