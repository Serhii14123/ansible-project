---
- name: Create project directory
  file:
    path: "{{ web_project_dir }}"
    state: directory
    owner: "{{ my_user }}"
    mode: '0755'

- name: Render Docker Compose template
  template:
    src: docker-compose.yml.j2
    dest: "{{ web_project_dir }}/docker-compose.yml"
    mode: '0644'

- name: Run Docker Compose
  community.docker.docker_compose_v2:
    project_src: "{{ web_project_dir }}"
    state: present
