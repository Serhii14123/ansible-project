---
- name: Create backup-manager user on the storage server
  delegate_to: "{{ backup_remote_server_ip }}"
  user:
    name: backup-manager
    state: present
    shell: /bin/bash

- name: Create backup directory on the storage server
  delegate_to: "{{ backup_remote_server_ip }}"
  file:
    path: "{{ backup_postgres_remote_path }}"
    state: directory
    owner: backup-manager
    group: backup-manager
    mode: '0700'
   

- name: Generate ed25519 SSH key for postgres user
  user:
    name: postgres
    generate_ssh_key: yes
    ssh_key_type: ed25519
  register: postgres_user_info

- name: Add key to storege server
  delegate_to: "{{ backup_remote_server_ip }}"
  authorized_key:
    user: backup-manager
    key: "{{ postgres_user_info.ssh_public_key }}"

    